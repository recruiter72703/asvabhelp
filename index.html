<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ASVAB Help - Registration</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 2em;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1 {
            color: #003366;
        }
        .container {
            background-color: #ffffff;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        .form-group {
            margin-bottom: 1.5em;
        }
        label {
            display: block;
            margin-bottom: 0.5em;
            color: #333;
            font-weight: 600;
        }
        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 0.8em;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .button {
            background-color: #005a9c;
            color: white;
            padding: 1em 2em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            width: 100%;
            text-transform: uppercase;
        }
        .button:hover {
            background-color: #003366;
        }
    </style>
</head>
<body>

    <h1>AR ASVAB HELP</h1>
    <div class="container">
        <h2>Register for Your Personalized Study Plan</h2>
        <form action="study-plan.html" method="GET">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" required>
            </div>
            <div class="form-group">
                <label for="high_school">High School Attending</label>
                <input type="text" id="high_school" name="high_school" required>
            </div>
            <div class="form-group">
                <label for="zip_code">Home Zip Code</label>
                <input type="text" id="zip_code" name="zip_code" pattern="[0-9]{5}" title="Five digit zip code" required>
            </div>
            <div class="form-group">
                <label for="last_asvab">Last Date ASVAB Was Taken</label>
                <input type="date" id="last_asvab" name="last_asvab">
            </div>
            <div class="form-group">
                <label for="branch">Interested Branch of Military</label>
                <select id="branch" name="branch">
                    <option value="">--Please choose an option--</option>
                    <option value="army">Army</option>
                    <option value="ARMY NATIONAL GUARD">Army National Guard</option>
                    <option value="navy">Navy</option>
                    <option value="air_force">Air Force</option>
                    <option value="marines">Marine Corps</option>
                    <option value="coast_guard">Coast Guard</option>
                    <option value="space_force">Space Force</option>
                </select>
            </div>
            <div class="form-group">
                <label for="career_field">Desired Career Field</label>
                <input type="text" id="career_field" name="career_field">
            </div>
            <div class="form-group">
                <button type="submit" class="button">Get My Study Plan</button>
            </div>
        </form>
    </div>

</body>
</html>
